<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — {{ area.name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; }
    header { background: #1e293b; color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .h-left { display: flex; align-items: center; gap: 8px; }
    .h-chip { background: #334155; padding: 2px 10px; border-radius: 20px; font-size: 11px; color: #94a3b8; }
    .h-btn { padding: 5px 12px; border: 1.5px solid #334155; border-radius: 6px; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; text-decoration: none; }
    .h-btn.active { background: #334155; color: #fff; }
    .budget-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 24px; }
    .budget-info { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 5px; }
    .track { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; position: relative; }
    .fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px; transition: width .4s; }
    .content { padding: 20px 24px; max-width: 700px; margin: 0 auto; }
    h2 { font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 14px; }
    .cart-item { background: #fff; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border: 1.5px solid #f1f5f9; margin-bottom: 8px; }
    .item-info { flex: 1; }
    .item-name { font-size: 13px; font-weight: 600; color: #1e293b; }
    .item-sub { font-size: 11px; color: #94a3b8; }
    .qty-row { display: flex; align-items: center; gap: 6px; }
    .qty-btn { width: 24px; height: 24px; border: 1.5px solid #e2e8f0; border-radius: 5px; background: #f8fafc; cursor: pointer; font-size: 14px; font-weight: 700; }
    .item-total { font-size: 13px; font-weight: 700; color: #1e293b; min-width: 70px; text-align: right; }
    .remove-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 14px; padding: 3px; }
    .summary { background: #f8fafc; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; margin-bottom: 14px; }
    .alert-box { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #92400e; margin-bottom: 14px; }
    textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #1e293b; resize: vertical; font-family: inherit; margin-bottom: 12px; }
    .btn-primary { padding: 12px; background: #1e293b; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 8px; }
    .btn-secondary { padding: 11px; background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; cursor: pointer; width: 100%; text-align: center; display: block; text-decoration: none; }
    .empty { text-align: center; padding: 60px 0; color: #94a3b8; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
    .modal-card { background: #fff; border-radius: 16px; padding: 30px 26px; width: 310px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-card h3 { font-size: 16px; font-weight: 700; text-align: center; }
    .modal-card p { font-size: 13px; color: #64748b; text-align: center; }
    input[type=password] { padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; width: 100%; outline: none; }
    .error-msg { font-size: 12px; color: #ef4444; text-align: center; }
    .sent-wrap { position: fixed; inset: 0; background: #f8fafc; display: flex; align-items: center; justify-content: center; display: none; }
    .sent-card { background: #fff; border-radius: 16px; padding: 40px 30px; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.1); display: flex; flex-direction: column; gap: 12px; align-items: center; }
  </style>
</head>
<body>
<header>
  <div class="h-left">
    <span style="font-size:18px">📋</span>
    <span style="font-weight:700;font-size:15px">Requisiciones</span>
    <span class="h-chip">{{ area.name }}</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="/catalogo" class="h-btn">Catálogo</a>
    <a href="/carrito" class="h-btn active">Carrito</a>
    <a href="/logout" class="h-btn">Salir</a>
  </div>
</header>

<div class="budget-bar">
  <div class="budget-info">
    <span>Presupuesto mensual: <b style="color:#1e293b">${{ "%.2f"|format(area.budget) }}</b></span>
    <span id="remaining-label"></span>
  </div>
  <div class="track">
    <div class="fill" id="spent-fill" style="width:{{ [((spent/area.budget)*100) if area.budget > 0 else 0, 100]|min }}%;background:#10b981"></div>
    <div class="fill" id="cart-fill" style="background:#3b82f688;width:0%"></div>
  </div>
  <div id="cart-total-label" style="font-size:11px;color:#64748b;margin-top:3px"></div>
</div>

<div class="content">
  <h2>Tu carrito</h2>
  <div id="cart-content"></div>
</div>

<!-- Modal Dirección -->
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <div style="font-size:36px;text-align:center">🔐</div>
    <h3>Autorización de Dirección</h3>
    <p id="modal-msg"></p>
    <input type="password" id="dir-pass" placeholder="Contraseña de Dirección">
    <p class="error-msg" id="dir-error" style="display:none"></p>
    <button class="btn-primary" onclick="handleAuth()">Autorizar y enviar</button>
    <button class="btn-secondary" style="display:block" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<!-- Pantalla enviado -->
<div class="sent-wrap" id="sent-wrap">
  <div class="sent-card">
    <div style="font-size:52px">✅</div>
    <h2 style="font-size:19px;color:#1e293b">¡Requisición enviada!</h2>
    <p style="font-size:13px;color:#64748b">Compras recibirá tu solicitud pronto.</p>
    <p id="auth-note" style="font-size:12px;color:#f59e0b;display:none">⚠️ Enviada con autorización de Dirección</p>
    <button class="btn-primary" onclick="nuevaReq()">Nueva requisición</button>
    <a href="/logout" class="btn-secondary">Cerrar sesión</a>
  </div>
</div>

<script>
const CATALOG  = {{ catalog|tojson }};
const BUDGET   = {{ area.budget }};
const SPENT    = {{ spent }};
let cart       = JSON.parse(localStorage.getItem('cart') || '{}');
let authorized = false;

function fmt(n) { return '$' + n.toLocaleString('es-MX', {minimumFractionDigits:2}); }

function getCartTotal() {
  return Object.entries(cart).reduce((s,[id,qty]) => { const p=CATALOG.find(x=>x.id===id); return s+(p?p.price*qty:0); },0);
}

function setQty(id, val) {
  const q = Math.max(0, parseInt(val)||0);
  if (q===0) delete cart[id]; else cart[id]=q;
  localStorage.setItem('cart', JSON.stringify(cart));
  render();
}

function render() {
  const total    = getCartTotal();
  const remaining = BUDGET - SPENT - total;
  const over     = remaining < 0;
  const pctSpent = BUDGET > 0 ? Math.min(100,(SPENT/BUDGET)*100) : 0;
  const pctCart  = BUDGET > 0 ? Math.min(100-pctSpent,(total/BUDGET)*100) : 0;

  document.getElementById('spent-fill').style.width = pctSpent+'%';
  document.getElementById('spent-fill').style.background = pctSpent>=100?'#ef4444':pctSpent>=80?'#f59e0b':'#10b981';
  document.getElementById('cart-fill').style.left  = pctSpent+'%';
  document.getElementById('cart-fill').style.width = pctCart+'%';
  document.getElementById('cart-fill').style.background = over?'#ef444488':'#3b82f688';
  document.getElementById('remaining-label').innerHTML = `<span style="color:${over?'#ef4444':'#10b981'}">Disponible: <b>${fmt(Math.max(0,remaining))}</b></span>`;
  document.getElementById('cart-total-label').textContent = total > 0 ? `Carrito: ${fmt(total)}
